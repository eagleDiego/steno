name: Build & Package

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  # ── Lint and Test (fast feedback, all platforms) ──────────
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev
          # PipeWire + ALSA headers for steno-core's audio capture deps
          sudo apt-get install -y -qq libpipewire-0.3-dev libspa-0.2-dev \
            libasound2-dev || true

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test integration

  # ── Build installers on all platforms ─────────────────────
  build-installers:
    needs: [lint-and-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: appimage,deb
            script: build/build-linux.sh
            artifact: steno-linux
          - os: macos-latest
            bundle: dmg
            script: build/build-macos.sh
            artifact: steno-macos
          - os: windows-latest
            bundle: nsis
            script: build/build-windows.sh
            artifact: steno-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev
          # PipeWire + ALSA headers for steno-core's audio capture deps
          sudo apt-get install -y -qq libpipewire-0.3-dev libspa-0.2-dev \
            libasound2-dev || true

      - name: Install macOS deps (Tauri)
        if: runner.os == 'macOS'
        run: |
          brew install node

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Build Rust app
        run: cargo build --release -p steno-app

      - name: Package app with Tauri CLI
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}
        env:
          # Prevent AppImage from trying to FUSE-mount
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Run smoke tests (Linux)
        if: runner.os == 'Linux'
        run: |
          # Smoke-test the .deb
          DEB=$(ls target/release/bundle/deb/*.deb 2>/dev/null || echo "")
          if [ -n "$DEB" ]; then
            ./build/smoke-test.sh "$DEB"
          else
            echo "No .deb found, testing AppImage directly"
            APPIMAGE=$(ls target/release/bundle/appimage/*.AppImage 2>/dev/null || echo "")
            if [ -n "$APPIMAGE" ]; then
              ./build/smoke-test.sh "$APPIMAGE"
            fi
          fi

      - name: Run smoke tests (macOS)
        if: runner.os == 'macOS'
        run: |
          DMG=$(ls target/release/bundle/dmg/*.dmg 2>/dev/null || echo "")
          if [ -n "$DMG" ]; then
            ./build/smoke-test.sh "$DMG"
          fi

      - name: Run smoke tests (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          EXE=$(ls target/release/bundle/nsis/*.exe 2>/dev/null || echo "")
          if [ -n "$EXE" ]; then
            ./build/smoke-test.sh "$EXE"
          fi

      - name: Upload installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.rpm
          if-no-files-found: warn

  # ── Combined summary ──────────────────────────────────────
  summary:
    needs: [build-installers]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print build summary
        run: |
          echo "=========================================="
          echo "  Steno CI Build Summary"
          echo "=========================================="
          echo "  Lint & Test      : ${{ needs.lint-and-test.result }}"
          echo "  Linux installers : ${{ needs.build-installers.result }}"
          echo "  macOS installers : ${{ needs.build-installers.result }}"
          echo "  Windows installers: ${{ needs.build-installers.result }}"
          echo ""
          echo "  Artifacts uploaded per platform."
          echo "  Download from the workflow run page."
          echo "=========================================="
