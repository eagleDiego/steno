name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: context.ref.replace('refs/tags/', ''),
              draft: false,
              prerelease: context.ref.includes('-')
            });
            return release.id;

  build-and-upload:
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: appimage,deb
            artifact-name: Steno-linux-x86_64
          - os: macos-latest
            bundle: dmg
            artifact-name: Steno-macos-x86_64
          - os: windows-latest
            bundle: nsis
            artifact-name: Steno-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev
          # PipeWire headers for steno-core's pipewire-rs dependency
          sudo apt-get install -y -qq libpipewire-0.3-dev libspa-0.2-dev || true

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Build
        run: npx tauri build --bundles ${{ matrix.bundle }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload release asset
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const glob = require('@actions/glob');
            const patterns = [
              'src-tauri/target/release/bundle/**/*.AppImage',
              'src-tauri/target/release/bundle/**/*.deb',
              'src-tauri/target/release/bundle/**/*.dmg',
              'src-tauri/target/release/bundle/**/*.exe',
              'src-tauri/target/release/bundle/**/*.msi',
              'src-tauri/target/release/bundle/**/*.rpm',
            ];
            for (const pattern of patterns) {
              const globber = await glob.create(pattern);
              for await (const file of globber.globGenerator()) {
                const name = path.basename(file);
                const content = fs.readFileSync(file);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: ${{ needs.release.outputs.upload_url }},
                  name: name,
                  data: content.toString('base64'),
                });
                console.log('Uploaded:', name);
              }
            }