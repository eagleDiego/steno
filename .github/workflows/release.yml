name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: appimage,deb
            asset-name: Steno-linux-x86_64
            artifacts: target/release/bundle/**/*.AppImage,target/release/bundle/**/*.deb
          - os: macos-latest
            bundle: dmg
            asset-name: Steno-macos-x86_64
            artifacts: target/release/bundle/**/*.dmg
          - os: windows-latest
            bundle: nsis
            asset-name: Steno-windows-x86_64
            artifacts: target/release/bundle/**/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev
          # PipeWire + ALSA headers for steno-core's audio capture deps
          sudo apt-get install -y -qq libpipewire-0.3-dev libspa-0.2-dev \
            libasound2-dev || true

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Import Apple Developer certificate (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -n "${APPLE_DEV_CERTIFICATE_P12_BASE64:-}" ]; then
            echo "==> Importing Apple Developer signing certificate..."
            echo "$APPLE_DEV_CERTIFICATE_P12_BASE64" | base64 -d > /tmp/dev-cert.p12
            security create-keychain -p temp /tmp/build.keychain
            security default-keychain -s /tmp/build.keychain
            security unlock-keychain -p temp /tmp/build.keychain
            security import /tmp/dev-cert.p12 \
              -k /tmp/build.keychain \
              -P "${APPLE_DEV_CERTIFICATE_PASSWORD:-}" \
              -T /usr/bin/codesign
            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k temp /tmp/build.keychain
            echo "==> Imported certificates:"
            security find-identity -v -p codesigning
            rm -f /tmp/dev-cert.p12
          else
            echo "==> No APPLE_DEV_CERTIFICATE_P12_BASE64 secret set — ad-hoc signing only"
          fi

      - name: Build Rust app
        run: cargo build --release -p steno-app

      - name: Package app with Tauri CLI
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          # macOS signing identity (from Apple Developer cert import)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization credentials (passed through to sign-macos.sh via env)
          APPLE_NOTARIZATION_EMAIL: ${{ secrets.APPLE_NOTARIZATION_EMAIL }}
          APPLE_NOTARIZATION_PASS: ${{ secrets.APPLE_NOTARIZATION_PASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload assets to release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: ${{ matrix.artifacts }}
          artifactErrorsFailBuild: true