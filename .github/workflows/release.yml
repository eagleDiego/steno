name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: appimage,deb
            asset-name: Steno-linux-x86_64
            artifacts: target/release/bundle/**/*.AppImage,target/release/bundle/**/*.deb,target/release/bundle/**/*.rpm
          - os: macos-latest
            bundle: dmg
            asset-name: Steno-macos-x86_64
            artifacts: target/release/bundle/**/*.dmg
          - os: windows-latest
            bundle: nsis
            asset-name: Steno-windows-x86_64
            artifacts: target/release/bundle/**/*.exe,target/release/bundle/**/*.msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev
          # PipeWire + ALSA headers for steno-core's audio capture deps
          sudo apt-get install -y -qq libpipewire-0.3-dev libspa-0.2-dev \
            libasound2-dev || true

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Build Rust app
        run: cargo build --release -p steno-app

      - name: Package app with Tauri CLI
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload assets to release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: ${{ matrix.artifacts }}
          artifactErrorsFailBuild: true